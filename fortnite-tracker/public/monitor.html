<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PapaMonitor - Estadísticas</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Librería de Gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --fn-purple: #a722ff; --fn-blue: #00bbff; --fn-yellow: #fef102;
            --fn-dark: #050114; --text: #ffffff;
            --es-red: #ed1c24; --es-yellow: #ffc400;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; background: var(--fn-dark); color: var(--text); 
            display: flex; height: 100vh; overflow: hidden;
        }
        
        .sidebar { width: 260px; background: rgba(0,0,0,0.95); border-right: 3px solid var(--fn-purple); padding: 25px; }
        .sidebar h2 { font-family: 'Bebas Neue'; font-size: 2.5rem; color: var(--fn-yellow); margin-bottom: 40px; }
        .nav-btn {
            background: none; border: none; color: white; font-family: 'Bebas Neue'; font-size: 1.6rem;
            text-align: left; padding: 12px; cursor: pointer; width: 100%; margin-bottom: 10px;
        }
        .nav-btn.active { background: var(--fn-purple); clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%); }

        .main { flex: 1; overflow-y: auto; background: #0a0a0a; }
        .top-bar { background: rgba(0,0,0,0.85); padding: 15px 40px; border-bottom: 3px solid var(--fn-yellow); display: flex; justify-content: space-between; align-items: center; }
        
        .content-section { padding: 40px; display: none; }
        .content-section.active { display: block; }

        /* Status Card */
        .status-card {
            background: linear-gradient(135deg, #120129, #050114); padding: 30px; border-radius: 20px;
            border: 2px solid var(--fn-blue); text-align: center; margin-bottom: 30px;
        }
        .status-badge { font-family: 'Bebas Neue'; font-size: 5rem; }
        .online { color: #00ff88; text-shadow: 0 0 20px #00ff88; }
        .offline { color: #ff3366; text-shadow: 0 0 20px #ff3366; }

        /* Gráficos */
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .chart-container { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        h3 { font-family: 'Bebas Neue'; font-size: 1.8rem; color: var(--fn-yellow); margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>PAPA MONITOR</h2>
        <button class="nav-btn active" onclick="showSection('inicio', this)">ESTADO</button>
        <button class="nav-btn" onclick="showSection('stats', this)">ESTADÍSTICAS</button>
    </div>

    <div class="main">
        <div class="top-bar">
            <div style="font-family: 'Bebas Neue'; font-size: 1.4rem; color: var(--fn-blue);">VALENCIA, ES</div>
            <div id="valencia-clock" style="font-family: 'Bebas Neue'; font-size: 2.5rem; color: var(--fn-yellow);">00:00:00</div>
        </div>

        <!-- SECCIÓN ESTADO -->
        <div id="inicio" class="content-section active">
            <div class="status-card">
                <div id="status-text" class="status-badge offline">OFFLINE</div>
                <div id="play-time" style="font-size: 2rem; font-family: 'Bebas Neue'; color: var(--fn-blue);">00H 00M 00S</div>
            </div>

            <div class="grid-stats">
                <div class="chart-container">
                    <h3>Actividad Semanal (Horas)</h3>
                    <canvas id="weeklyChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Distribución 24hs</h3>
                    <canvas id="dailyChart"></canvas>
                </div>
            </div>
        </div>

        <!-- SECCIÓN EXPLAYADA -->
        <div id="stats" class="content-section">
            <h2 style="font-family:'Bebas Neue'; font-size: 2.5rem; margin-bottom: 20px;">Análisis de Sesiones</h2>
            <div class="chart-container" style="height: 400px;">
                <canvas id="explayadoChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ztcvaoclharvidkaitob.supabase.co";
        const SUPABASE_KEY = "TU_KEY";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let startTime = null;
        let isOnline = false;

        function showSection(id, btn) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        // --- RELOJ Y CONTADOR LITERAL ---
        setInterval(() => {
            const now = new Date();
            document.getElementById('valencia-clock').innerText = now.toLocaleTimeString('es-ES', { timeZone: 'Europe/Madrid', hour12: false });
            
            if (isOnline && startTime) {
                const diff = Math.floor((new Date() - startTime) / 1000);
                const h = String(Math.floor(diff / 3600)).padStart(2, '0');
                const m = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
                const s = String(diff % 60).padStart(2, '0');
                document.getElementById('play-time').innerText = `LLEVÁS JUGANDO: ${h}H ${m}M ${s}S`;
            }
        }, 1000);

        async function loadDashboard() {
            const { data } = await _supabase.from('sessions').select('*').order('start_time', { ascending: false }).limit(20);
            
            if (data && data.length > 0) {
                const last = data[0];
                isOnline = last.is_active;
                startTime = new Date(last.start_time);
                
                const statusTxt = document.getElementById('status-text');
                statusTxt.innerText = isOnline ? "ONLINE" : "OFFLINE";
                statusTxt.className = `status-badge ${isOnline ? 'online' : 'offline'}`;
                if(!isOnline) document.getElementById('play-time').innerText = "ESTÁ FUERA DEL JUEGO";

                renderCharts(data);
            }
        }

        function renderCharts(sessions) {
            // Lógica para procesar datos de las últimas sesiones
            const ctxWeekly = document.getElementById('weeklyChart').getContext('2d');
            new Chart(ctxWeekly, {
                type: 'bar',
                data: {
                    labels: ['Lun', 'Mar', 'Mie', 'Jue', 'Vie', 'Sab', 'Dom'],
                    datasets: [{
                        label: 'Horas',
                        data: [2, 5, 3, 8, 4, 10, 6], // Aquí iría el cálculo real por día
                        backgroundColor: '#00bbff'
                    }]
                },
                options: { plugins: { legend: { display: false } } }
            });

            const ctxDaily = document.getElementById('dailyChart').getContext('2d');
            new Chart(ctxDaily, {
                type: 'doughnut',
                data: {
                    labels: ['Online', 'Offline'],
                    datasets: [{
                        data: [30, 70], // Ejemplo porcentual
                        backgroundColor: ['#a722ff', '#222']
                    }]
                }
            });
        }

        loadDashboard();
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
