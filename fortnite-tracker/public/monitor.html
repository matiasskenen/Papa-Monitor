<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PapaMonitor - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --fn-purple: #a722ff; --fn-blue: #00bbff; --fn-yellow: #fef102;
            --fn-dark: #050114; --text: #ffffff;
        }
        body {
            font-family: 'Inter', sans-serif; background: var(--fn-dark); color: var(--text); margin: 0; display: flex; height: 100vh;
        }
        /* Sidebar */
        .sidebar {
            width: 250px; background: rgba(0,0,0,0.9); border-right: 2px solid var(--fn-purple);
            display: flex; flex-direction: column; padding: 20px;
        }
        .sidebar h2 { font-family: 'Bebas Neue'; font-size: 2rem; color: var(--fn-yellow); margin-bottom: 30px; }
        .nav-btn {
            background: none; border: none; color: white; font-family: 'Bebas Neue'; font-size: 1.5rem;
            text-align: left; padding: 10px; cursor: pointer; transition: 0.3s; margin-bottom: 10px;
        }
        .nav-btn:hover, .nav-btn.active { color: var(--fn-blue); border-left: 4px solid var(--fn-blue); padding-left: 15px; }

        /* Main Content */
        .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .top-bar {
            background: rgba(0,0,0,0.8); padding: 15px 30px; border-bottom: 2px solid var(--fn-yellow);
            display: flex; justify-content: space-between; align-items: center;
        }
        .clock-box { text-align: right; }
        .valencia-time { font-family: 'Bebas Neue'; font-size: 2.5rem; color: var(--fn-yellow); line-height: 1; }
        
        .content-section { padding: 40px; display: none; }
        .content-section.active { display: block; }

        /* Cards */
        .status-card {
            background: linear-gradient(135deg, #1a1a1a, #000); padding: 30px; border-radius: 15px;
            border: 2px solid var(--fn-blue); text-align: center; margin-bottom: 30px;
        }
        .status-badge { font-family: 'Bebas Neue'; font-size: 4rem; text-shadow: 0 0 20px currentColor; }
        .online { color: #00ff88; } .offline { color: #ff3366; }

        .time-comparison {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;
            font-family: 'Bebas Neue'; font-size: 1.2rem; background: rgba(255,255,255,0.05); padding: 15px;
        }

        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        input:checked + .slider { background-color: var(--fn-purple); }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>PAPANET CONTROL</h2>
        <button class="nav-btn active" onclick="showSection('inicio', this)">INICIO</button>
        <button class="nav-btn" onclick="showSection('config', this)">CONFIGURACIÓN</button>
        <button class="nav-btn" onclick="showSection('notif', this)">NOTIFICACIONES</button>
    </div>

    <div class="main">
        <div class="top-bar">
            <div><span style="color:var(--fn-blue)">UBICACIÓN ACTUAL:</span> VALENCIA, ES</div>
            <div class="clock-box">
                <div id="valencia-clock" class="valencia-time">00:00:00</div>
                <div style="font-size: 0.8rem; opacity: 0.6;">HORARIO ESPAÑA</div>
            </div>
        </div>

        <!-- SECCIÓN INICIO -->
        <div id="inicio" class="content-section active">
            <div class="status-card">
                <div id="status-text" class="status-badge offline">OFFLINE</div>
                <div id="play-time" style="font-size: 1.5rem; margin-top: 10px;">Cargando datos...</div>
            </div>

            <div id="off-details" style="display: none;">
                <h3 style="font-family:'Bebas Neue'; color: var(--fn-yellow);">Última desconexión registrada:</h3>
                <div class="time-comparison">
                    <div>🇦🇷 ARGENTINA: <span id="time-ar" style="color:var(--fn-blue)">--:--</span></div>
                    <div>🇪🇸 VALENCIA: <span id="time-es" style="color:var(--fn-purple)">--:--</span></div>
                </div>
            </div>
        </div>

        <!-- SECCIÓN CONFIG -->
        <div id="config" class="content-section">
            <h2 style="font-family:'Bebas Neue';">Ajustes del Sistema</h2>
            <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center;">
                <span>Enviar notificaciones por Email</span>
                <label class="switch">
                    <input type="checkbox" id="email-toggle" onchange="updateConfig(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG SUPABASE ---
        const SUPABASE_URL = "https://ztcvaoclharvidkaitob.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp0Y3Zhb2NsaGFydmlka2FpdG9iIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDY3MTYwMSwiZXhwIjoyMDkwMjQ3NjAxfQ.XQVwWIva46r7w2LOrz4FO4FnCFHmI_lstoYWBP9yo-g";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function showSection(id, btn) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        // --- RELOJ VALENCIA ---
        function updateClock() {
            const now = new Date();
            const options = { timeZone: 'Europe/Madrid', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('valencia-clock').innerText = new Intl.DateTimeFormat('es-ES', options).format(now);
        }
        setInterval(updateClock, 1000);

        // --- LÓGICA DE DATOS ---
        async function loadData() {
            // 1. Ejecutar RPC para limpiar sesiones viejas
            await supabase.rpc('cerrar_sesiones_muertas');

            // 2. Traer última sesión
            const { data, error } = await supabase.table('sessions').select('*').order('start_time', { ascending: false }).limit(1).single();

            if (data) {
                const statusText = document.getElementById('status-text');
                const playTime = document.getElementById('play-time');
                const offDetails = document.getElementById('off-details');

                if (data.is_active) {
                    statusText.innerText = "ONLINE";
                    statusText.className = "status-badge online";
                    offDetails.style.display = "none";
                    
                    // Calcular tiempo jugando
                    const start = new Date(data.start_time);
                    const diff = Math.floor((new Date() - start) / 1000 / 60); // min
                    playTime.innerText = `Lleva jugando: ${Math.floor(diff/60)}h ${diff%60}min`;
                } else {
                    statusText.innerText = "OFFLINE";
                    statusText.className = "status-badge offline";
                    playTime.innerText = "Monitor a la espera de actividad...";
                    offDetails.style.display = "block";

                    // Comparación horaria desconexión
                    const end = new Date(data.end_time);
                    const optES = { timeZone: 'Europe/Madrid', hour: '2-digit', minute: '2-digit' };
                    const optAR = { timeZone: 'America/Argentina/Buenos_Aires', hour: '2-digit', minute: '2-digit' };
                    
                    document.getElementById('time-es').innerText = new Intl.DateTimeFormat('es-ES', optES).format(end) + " HS";
                    document.getElementById('time-ar').innerText = new Intl.DateTimeFormat('es-ES', optAR).format(end) + " HS";
                }
            }
        }

        async function loadConfig() {
            const { data } = await supabase.table('config').select('value').eq('key', 'emails_enabled').single();
            if (data) document.getElementById('email-toggle').checked = (data.value === 'true' || data.value === true);
        }

        async function updateConfig(val) {
            await supabase.table('config').update({ value: val }).eq('key', 'emails_enabled');
        }

        loadData(); loadConfig();
        setInterval(loadData, 30000); // Recarga cada 30 segundos
    </script>
</body>
</html>
