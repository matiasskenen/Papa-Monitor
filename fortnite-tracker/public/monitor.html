<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PapaMonitor – Panel</title>
    <meta name="description" content="Panel de monitoreo en tiempo real de PapaMonitor">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/monitor.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>

<body>

    <!-- SIDEBAR / NAV MÓVIL -->
    <nav class="sidebar">
        <h2>PAPA MONITOR</h2>
        <button class="nav-btn active" onclick="showSection('inicio', this)">ESTADO</button>
        <button class="nav-btn" onclick="showSection('graficos', this)">GRÁFICOS</button>
        <button class="nav-btn" onclick="showSection('sesiones', this)">SESIONES</button>
    </nav>

    <div class="main">

        <!-- BARRA SUPERIOR CON RELOJES -->
        <header class="top-bar">
            <div class="clocks-row">
                <div class="clock-block">
                    <span class="flag">🇪🇸</span>
                    <div>
                        <div class="where">ESPAÑA</div>
                        <div id="clock-es" class="clock-val">--:--:--</div>
                    </div>
                </div>
                <div class="clock-block">
                    <span class="flag">🇦🇷</span>
                    <div>
                        <div class="where">ARGENTINA</div>
                        <div id="clock-ar" class="clock-val">--:--:--</div>
                    </div>
                </div>
            </div>
        </header>

        <!-- SECCIÓN: ESTADO -->
        <section id="inicio" class="content-section active">
            <div class="status-card">
                <div id="status-text" class="status-badge offline">OFFLINE</div>
                <div id="play-time" style="font-weight:600;color:#aaa">CARGANDO...</div>
                <p id="offline-hint" style="font-size:0.8rem;margin-top:15px;opacity:0.7;display:none"></p>
            </div>
            <h3 style="font-family:'Bebas Neue';margin-bottom:15px;color:var(--fn-blue)">Últimas sesiones</h3>
            <ul id="last-sessions-list" class="session-strip"></ul>
        </section>

        <!-- SECCIÓN: GRÁFICOS -->
        <section id="graficos" class="content-section">
            <h2 style="font-family:'Bebas Neue';font-size:2rem;margin-bottom:5px">Gráficos</h2>
            <p style="color:#888;font-size:0.85rem;margin-bottom:20px">Minutos jugados por día (últimos 30 días)</p>
            <div class="chart-container">
                <canvas id="playtimeChart"></canvas>
            </div>
        </section>

        <!-- SECCIÓN: SESIONES -->
        <section id="sesiones" class="content-section">
            <h2 style="font-family:'Bebas Neue';font-size:2rem;margin-bottom:5px">Sesiones</h2>
            <p style="color:#888;font-size:0.85rem;margin-bottom:15px">Historial de las últimas 30 sesiones</p>
            <div class="table-wrapper">
                <table class="sessions-detail" id="sessions-table">
                    <thead>
                        <tr>
                            <th>Inicio (ES)</th>
                            <th>Fin (ES)</th>
                            <th>Duración</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="4" style="text-align:center;color:#555">Cargando...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </div><!-- /.main -->

    <script src="/monitor.js"></script>
</body>

</html>
