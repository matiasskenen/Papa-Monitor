<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PapaMonitor - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <!-- Librería de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --fn-purple: #a722ff; --fn-blue: #00bbff; --fn-yellow: #fef102;
            --fn-dark: #050114; --text: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; background: var(--fn-dark); color: var(--text); 
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }
        
        /* Sidebar */
        .sidebar {
            width: 260px; background: rgba(0,0,0,0.95); border-right: 3px solid var(--fn-purple);
            display: flex; flex-direction: column; padding: 25px;
        }
        .sidebar h2 { font-family: 'Bebas Neue'; font-size: 2.5rem; color: var(--fn-yellow); margin-bottom: 40px; text-shadow: 2px 2px 0 #000; }
        .nav-btn {
            background: none; border: none; color: white; font-family: 'Bebas Neue'; font-size: 1.6rem;
            text-align: left; padding: 12px; cursor: pointer; transition: 0.3s; margin-bottom: 15px;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
        }
        .nav-btn:hover, .nav-btn.active { background: var(--fn-purple); color: white; padding-left: 20px; }

        /* Main Content */
        .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); }
        .top-bar {
            background: rgba(0,0,0,0.85); padding: 15px 40px; border-bottom: 3px solid var(--fn-yellow);
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10;
        }
        .valencia-time { font-family: 'Bebas Neue'; font-size: 3rem; color: var(--fn-yellow); text-shadow: 0 0 15px rgba(254, 241, 2, 0.4); line-height: 1; }
        
        .content-section { padding: 40px; display: none; max-width: 900px; margin: 0 auto; width: 100%; }
        .content-section.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Status Card */
        .status-card {
            background: linear-gradient(135deg, #120129, #050114); padding: 40px; border-radius: 20px;
            border: 2px solid var(--fn-blue); text-align: center; margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 187, 255, 0.2);
        }
        .status-badge { font-family: 'Bebas Neue'; font-size: 6rem; line-height: 1; margin-bottom: 10px; }
        .online { color: #00ff88; text-shadow: 0 0 25px #00ff88; }
        .offline { color: #ff3366; text-shadow: 0 0 25px #ff3366; }

        .time-comparison {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px;
        }
        .time-box {
            background: rgba(255,255,255,0.07); padding: 25px; border-radius: 10px; border-bottom: 4px solid var(--fn-purple);
            text-align: center; font-family: 'Bebas Neue';
        }
        .time-box span { display: block; font-size: 2.5rem; margin-top: 5px; }

        /* Switch */
        .config-row { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .switch { position: relative; display: inline-block; width: 65px; height: 35px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 27px; width: 27px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--fn-purple); }
        input:checked + .slider:before { transform: translateX(30px); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>SQUAD MONITOR</h2>
        <button class="nav-btn active" onclick="showSection('inicio', this)">INICIO</button>
        <button class="nav-btn" onclick="showSection('config', this)">CONFIGURACIÓN</button>
        <button class="nav-btn" onclick="showSection('notif', this)">NOTIFICACIONES</button>
    </div>

    <div class="main">
        <div class="top-bar">
            <div style="font-family: 'Bebas Neue'; font-size: 1.4rem; color: var(--fn-blue);">LOCALIZACIÓN: VALENCIA, ESPAÑA</div>
            <div style="text-align: right;">
                <div id="valencia-clock" class="valencia-time">00:00:00</div>
                <div style="font-size: 0.8rem; letter-spacing: 2px; opacity: 0.7;">RELOJ MAESTRO</div>
            </div>
        </div>

        <!-- SECCIÓN INICIO -->
        <div id="inicio" class="content-section active">
            <div class="status-card">
                <div id="status-text" class="status-badge offline">OFFLINE</div>
                <div id="play-time" style="font-size: 1.8rem; font-family: 'Bebas Neue'; color: var(--fn-blue);">BUSCANDO SEÑAL...</div>
            </div>

            <div id="off-details" style="display: none;">
                <h3 style="font-family:'Bebas Neue'; color: var(--fn-yellow); font-size: 1.8rem; text-align: center;">Última desconexión del Squad</h3>
                <div class="time-comparison">
                    <div class="time-box">🇦🇷 ARGENTINA <span id="time-ar" style="color:var(--fn-blue)">--:--</span></div>
                    <div class="time-box">🇪🇸 VALENCIA <span id="time-es" style="color:var(--fn-purple)">--:--</span></div>
                </div>
            </div>
        </div>

        <!-- SECCIÓN CONFIG -->
        <div id="config" class="content-section">
            <h2 style="font-family:'Bebas Neue'; font-size: 2.5rem; margin-bottom: 20px;">Ajustes de Alerta</h2>
            <div class="config-row">
                <div style="font-size: 1.2rem;">Enviar notificaciones por Email (Resend API)</div>
                <label class="switch">
                    <input type="checkbox" id="email-toggle" onchange="updateConfig(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG SUPABASE ---
        const SUPABASE_URL = "https://ztcvaoclharvidkaitob.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp0Y3Zhb2NsaGFydmlka2FpdG9iIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDY3MTYwMSwiZXhwIjoyMDkwMjQ3NjAxfQ.XQVwWIva46r7w2LOrz4FO4FnCFHmI_lstoYWBP9yo-g";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function showSection(id, btn) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        // --- RELOJ VALENCIA EN VIVO ---
        function updateClock() {
            const options = { timeZone: 'Europe/Madrid', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('valencia-clock').innerText = new Intl.DateTimeFormat('es-ES', options).format(new Date());
        }
        setInterval(updateClock, 1000);

        // --- LÓGICA DE DATOS ---
        async function loadData() {
            try {
                // 1. Limpiar sesiones muertas via RPC
                await _supabase.rpc('cerrar_sesiones_muertas');

                // 2. Traer última sesión registrada
                const { data, error } = await _supabase.from('sessions').select('*').order('start_time', { ascending: false }).limit(1).single();

                if (data) {
                    const statusText = document.getElementById('status-text');
                    const playTime = document.getElementById('play-time');
                    const offDetails = document.getElementById('off-details');

                    if (data.is_active) {
                        statusText.innerText = "ONLINE";
                        statusText.className = "status-badge online";
                        offDetails.style.display = "none";
                        
                        const start = new Date(data.start_time);
                        const diff = Math.floor((new Date() - start) / 1000 / 60); 
                        playTime.innerText = `LLEVÁ JUGANDO: ${Math.floor(diff/60)}H ${diff%60}M`;
                    } else {
                        statusText.innerText = "OFFLINE";
                        statusText.className = "status-badge offline";
                        playTime.innerText = "SQUAD EN ESPERA...";
                        offDetails.style.display = "block";

                        const end = new Date(data.end_time);
                        const optES = { timeZone: 'Europe/Madrid', hour: '2-digit', minute: '2-digit', hour12: false };
                        const optAR = { timeZone: 'America/Argentina/Buenos_Aires', hour: '2-digit', minute: '2-digit', hour12: false };
                        
                        document.getElementById('time-es').innerText = new Intl.DateTimeFormat('es-ES', optES).format(end) + " HS";
                        document.getElementById('time-ar').innerText = new Intl.DateTimeFormat('es-ES', optAR).format(end) + " HS";
                    }
                }
            } catch (e) { console.error("Error Supabase:", e); }
        }

        async function loadConfig() {
            const { data } = await _supabase.from('config').select('value').eq('key', 'emails_enabled').single();
            if (data) document.getElementById('email-toggle').checked = (data.value === 'true' || data.value === true);
        }

        async function updateConfig(val) {
            await _supabase.from('config').update({ value: val }).eq('key', 'emails_enabled');
        }

        // Ejecución inicial
        updateClock();
        loadData(); 
        loadConfig();
        setInterval(loadData, 15000); // Recarga cada 15 seg
    </script>
</body>
</html>
