<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Papa Monitor</title>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; text-align: center; padding: 20px; }
        .card { background: #151515; padding: 20px; border-radius: 12px; margin: 15px auto; max-width: 600px; }
        .status-badge { padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; border: none; }
        .online { background: #00ff88; color: black; box-shadow: 0 0 10px #00ff88; }
        .offline { background: #444; color: #aaa; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border-bottom: 1px dotted #333; font-size: 0.85em; }
    </style>
</head>
<body>
    <h1>Tracker de Papá</h1>
    <div class="card">
        <span id="badge" class="status-badge offline">VERIFICANDO...</span>
    </div>
    <div class="card">
        <span>Alertas Email: </span>
        <button id="mail-btn" onclick="toggleMail()" class="status-badge offline">...</button>
    </div>
    <div class="card">
        <table>
            <thead><tr><th>Inicio</th><th>Fin</th><th>Duración</th></tr></thead>
            <tbody id="rows"></tbody>
        </table>
    </div>
    <script>
        async function load() {
            const r = await fetch('/api/status');
            const data = await r.json();
            const badge = document.getElementById('badge');
            badge.innerText = (data.length > 0 && data[0].is_active) ? "JUGANDO AHORA" : "OFFLINE";
            badge.className = (data.length > 0 && data[0].is_active) ? "status-badge online" : "status-badge offline";
            document.getElementById('rows').innerHTML = data.map(s => `
                <tr><td>${new Date(s.start_time).toLocaleString()}</td>
                <td>${s.end_time ? new Date(s.end_time).toLocaleString() : '---'}</td>
                <td>${s.duration_minutes || 0} min</td></tr>`).join('');
            
            const c = await fetch('/api/config');
            const conf = await c.json();
            const btn = document.getElementById('mail-btn');
            btn.innerText = conf.value ? "ACTIVADAS" : "DESACTIVADAS";
            btn.style.background = conf.value ? "#2ecc71" : "#e74c3c";
        }
        async function toggleMail() {
            const btn = document.getElementById('mail-btn');
            const status = btn.innerText === "ACTIVADAS";
            await fetch('/api/config', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({enabled: !status}) });
            load();
        }
        load();
        setInterval(load, 30000);
    </script>
</body>
</html>
